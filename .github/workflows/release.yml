name: Build and Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Release
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Save Package.resolved
        run: cp OpenDictator.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved /tmp/Package.resolved

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Restore Package.resolved
        run: |
          mkdir -p OpenDictator.xcodeproj/project.xcworkspace/xcshareddata/swiftpm
          cp /tmp/Package.resolved OpenDictator.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project OpenDictator.xcodeproj \
            -scheme OpenDictator

      - name: Build archive
        run: |
          xcodebuild archive \
            -project OpenDictator.xcodeproj \
            -scheme OpenDictator \
            -configuration Release \
            -archivePath build/OpenDictator.xcarchive \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="-" \
            MARKETING_VERSION="${{ steps.version.outputs.VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            EXCLUDED_ARCHS=x86_64

      - name: Export app from archive
        run: |
          mkdir -p build/Export
          cp -R build/OpenDictator.xcarchive/Products/Applications/OpenDictator.app build/Export/

      - name: Ad-hoc codesign
        run: codesign --force --deep -s - build/Export/OpenDictator.app

      - name: Create DMG
        run: |
          create-dmg \
            --volname "OpenDictator" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "OpenDictator.app" 150 190 \
            --hide-extension "OpenDictator.app" \
            --app-drop-link 450 190 \
            --no-internet-enable \
            --sandbox-safe \
            "build/OpenDictator-${{ steps.version.outputs.VERSION }}.dmg" \
            "build/Export/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: OpenDictator v${{ steps.version.outputs.VERSION }}
          body: |
            ## OpenDictator v${{ steps.version.outputs.VERSION }}

            ### Install

            **Download DMG:** Grab `OpenDictator-${{ steps.version.outputs.VERSION }}.dmg` below, open it, and drag OpenDictator to Applications.

            > **First launch:** macOS may show a security warning because the app is not notarized. Right-click the app and select **Open**, or go to **System Settings > Privacy & Security** and click **Open Anyway**.

            ### Requirements
            - macOS 13.0+
            - Apple Silicon (M1/M2/M3/M4)
          files: build/OpenDictator-${{ steps.version.outputs.VERSION }}.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
