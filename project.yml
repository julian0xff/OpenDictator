name: OpenDictator
options:
  bundleIdPrefix: dev.julian0xff
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.9"
    ARCHS: arm64
    VALID_ARCHS: arm64
    EXCLUDED_ARCHS[sdk=macosx*]: x86_64

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.7.9"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.0.0"
  PhosphorSwift:
    url: https://github.com/phosphor-icons/swift
    from: "2.1.0"

targets:
  OpenDictator:
    type: application
    platform: macOS
    sources:
      - path: OpenDictator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.julian0xff.opendictator
        PRODUCT_NAME: OpenDictator
        MARKETING_VERSION: "0.9.1"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OpenDictator/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenDictator/Resources/OpenDictator.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: WhisperKit
      - package: FluidAudio
        product: FluidAudio
      - package: KeyboardShortcuts
      - package: Yams
      - package: PhosphorSwift
    entitlements:
      path: OpenDictator/Resources/OpenDictator.entitlements
  OpenDictatorDev:
    type: application
    platform: macOS
    sources:
      - path: OpenDictator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.julian0xff.opendictator.dev
        PRODUCT_NAME: "OpenDictator Dev"
        MARKETING_VERSION: "0.9.1"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: OpenDictator/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: OpenDictator/Resources/OpenDictator.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - package: WhisperKit
      - package: FluidAudio
        product: FluidAudio
      - package: KeyboardShortcuts
      - package: Yams
      - package: PhosphorSwift
    entitlements:
      path: OpenDictator/Resources/OpenDictator.entitlements
